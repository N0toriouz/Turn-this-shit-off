<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Half Way There — MadeUp MonkeyShit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--black: #0A0A0A; --near-black: #111111; --card-bg: #161616;
--border: #2A2A2A; --silver: #C8C8C8; --silver-dim: #888888;
--gold: #D4AF37; --white: #F2F2F2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #0A0A0A; overflow-x: hidden; }
body { background: transparent; color: var(--silver); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.7; }
#page-backdrop {
  position: fixed; inset: 0; z-index: -1;
  background-color: #0A0A0A; background-size: cover; background-position: center center;
  filter: blur(12px) saturate(0.6) brightness(0.9); transform: scale(1.15); pointer-events: none;
}
nav {
position: fixed; top: 0; left: 0; right: 0; z-index: 100;
background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px;
display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--gold); text-decoration: none; }
.nav-back { color: var(--silver-dim); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
.nav-back:hover { color: var(--gold); }
.album-header { padding: 100px 4rem 3rem; max-width: 1200px; margin: 0 auto; display: flex; gap: 2.5rem; align-items: flex-end; border-bottom: 1px solid var(--border); }
.album-art-frame { position: relative; width: 336px; max-width: 100%; flex-shrink: 0; margin-top: 12px; margin-left: 12px; }
.album-art-frame::before { content: ''; position: absolute; top: -10px; left: -10px; right: 10px; bottom: 10px; border: 1px solid rgba(212,175,55,0.55); border-radius: 2px; z-index: 0; pointer-events: none; }
.album-art-frame img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 2px; display: block; position: relative; z-index: 1; filter: contrast(1.05) saturate(0.9); }
.stream-links { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
.stream-btn { display: inline-block; padding: 0.4rem 0.9rem; background: var(--gold); border: 1px solid var(--gold); border-radius: 2px; color: var(--black); text-decoration: none; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; transition: background 0.2s, border-color 0.2s; }
.stream-btn:hover { background: #E8C547; border-color: #E8C547; }
.album-meta { flex: 1; }
.album-eyebrow { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
.album-title { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); color: var(--white); line-height: 1.1; margin-bottom: 0.5rem; }
.album-track-count { font-size: 0.8rem; color: var(--silver-dim); }
.section { padding: 3rem 4rem; max-width: 1200px; margin: 0 auto; }
.section-label { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
.song-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
.song-row { border: 1px solid var(--border); border-radius: 2px; overflow: hidden; background: var(--card-bg); }
.song-title { padding: 0.6rem 0.85rem; font-family: 'DM Serif Display', serif; font-size: 0.78rem; color: var(--silver); font-style: italic; border-bottom: 1px solid var(--border); }
.song-row iframe { display: block; width: 100%; }
.stats-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.45rem 0.85rem; font-size: 0.75rem; color: var(--silver-dim); letter-spacing: 0.04em; border-top: 1px solid var(--border); font-variant-numeric: tabular-nums; }
.stats-bar .country { font-variant: small-caps; letter-spacing: 0.1em; }
.track-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
.track-card { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); background: var(--card-bg); }
.track-card:last-child { border-bottom: none; }
.track-num { font-size: 0.7rem; color: var(--silver-dim); width: 1.5rem; text-align: right; flex-shrink: 0; }
.track-name { flex: 1; font-size: 0.88rem; color: var(--silver); }
footer { border-top: 1px solid var(--border); padding: 2rem 4rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; background: var(--near-black); margin-top: 3rem; }
.footer-name { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--gold); font-style: italic; }
.footer-note { font-size: 0.75rem; color: var(--silver-dim); opacity: 0.5; }
@media (max-width: 768px) {
.album-header { padding: 90px 1.5rem 2rem; flex-direction: column; align-items: flex-start; gap: 1.5rem; }
.album-art-frame { width: 160px; margin-top: 8px; margin-left: 8px; }
.album-art-frame::before { top: -6px; left: -6px; right: 6px; bottom: 6px; }
.section { padding: 2rem 1.5rem; }
.track-list { grid-template-columns: 1fr; }
.song-grid { grid-template-columns: 1fr; }
footer { padding: 2rem 1.5rem; flex-direction: column; }
}
</style>
</head>
<body>
<div id="page-backdrop"></div>
<nav>
<a href="/" class="nav-logo">MadeUp MonkeyShit</a>
<a href="/#catalog" class="nav-back">← All Albums</a>
</nav>

<div class="album-header">
<div class="album-art-frame"><img src="../Half Way There.jpg" alt="Half Way There album art" onerror="this.parentElement.style.display='none'"></div>
<div class="album-meta">
<p class="album-eyebrow">March 2026</p>
<h1 class="album-title">Half Way There</h1>
<p class="album-track-count">17 tracks</p>
<div class="stream-links">
<a href="https://music.apple.com/us/album/half-way-there/1884249939" class="stream-btn" target="_blank" rel="noopener">Apple Music</a>
<a href="https://music.amazon.ca/albums/B0GS4TJQQ4" class="stream-btn" target="_blank" rel="noopener">Amazon Music</a>
<a href="https://tidal.com/album/506074841" class="stream-btn" target="_blank" rel="noopener">Tidal</a>
</div>
</div>
</div>

<div class="section" id="highlightsSection">
<p class="section-label">Streaming Highlights</p>
<div class="song-grid" id="songGrid"><p style="color:var(--silver-dim);font-style:italic;font-size:.85rem">Loading...</p></div>
</div>

<div class="section">
<p class="section-label">All 17 Tracks</p>
<div class="track-list" id="trackList"><p style="color:var(--silver-dim);font-style:italic;font-size:.85rem">Loading...</p></div>
</div>

<footer>
<span class="footer-name">MadeUp MonkeyShit</span>
<span class="footer-note">Proud to make just awful music.</span>
</footer>

<script>
function fmtStat(n) {
  n = parseInt(n) || 0;
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}
function countryAbbr(name) {
  if (!name) return '';
  const m = {'united states':'USA','us':'USA','usa':'USA','united kingdom':'GBR','uk':'GBR','canada':'CAN','australia':'AUS','germany':'DEU','france':'FRA','brazil':'BRA','mexico':'MEX','japan':'JPN','south korea':'KOR','india':'IND','nigeria':'NGA','spain':'ESP','italy':'ITA','netherlands':'NLD','sweden':'SWE','norway':'NOR','philippines':'PHL','ghana':'GHA','south africa':'ZAF','new zealand':'NZL','ireland':'IRL','portugal':'PRT','colombia':'COL','argentina':'ARG','chile':'CHL','turkey':'TUR','russia':'RUS','poland':'POL','singapore':'SGP','malaysia':'MYS','thailand':'THA','indonesia':'IDN','kenya':'KEN'};
  return m[name.trim().toLowerCase()] || name.trim().slice(0, 6).toUpperCase();
}
async function loadTrackSocial(container) {
  const rows = Array.from(container.querySelectorAll('.song-row[data-song-name]'));
  if (!rows.length) return;
  try {
    const results = await Promise.all(
      rows.map(row =>
        fetch('/track-stats?name=' + encodeURIComponent(row.dataset.songName))
          .then(r => r.ok ? r.json() : null).catch(() => null)
      )
    );
    rows.forEach((row, i) => {
      const data = results[i];
      if (!data?.success || !data.result) return;
      const s = data.result;
      const bar = row.querySelector('.stats-bar');
      if (!bar) return;
      const spans = bar.querySelectorAll('span');
      if (spans[0] && s.total_streams) spans[0].textContent = '🎵 ' + fmtStat(s.total_streams);
      if (spans[1] && s.total_likes) spans[1].textContent = '❤️ ' + fmtStat(s.total_likes);
      if (spans[2] && s.top_country) spans[2].textContent = countryAbbr(s.top_country);
    });
  } catch(e) {}
}
async function loadStats() {
  const trackList = document.getElementById('trackList');
  try {
    const res = await fetch('/track-stats?album_name=Half%20Way%20There');
    const data = await res.json();
    if (!data.success || !data.results) return;
    data.results.sort((a, b) => (parseInt(a.art) || 0) - (parseInt(b.art) || 0));
    trackList.innerHTML = '';
    data.results.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'song-row';
      const safeName = s.name.replace(/&/g,'&amp;').replace(/</g,'&lt;');
      card.innerHTML = `<div class="song-title">${safeName}</div>` +
        (s.spotify_embed_url
          ? `<iframe src="${s.spotify_embed_url}" height="80" frameborder="0" allowtransparency="true" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`
          : '') +
        `<div class="stats-bar"><span>🎵 ${fmtStat(s.total_streams)}</span><span>${s.total_likes ? '❤️ ' + fmtStat(s.total_likes) : ''}</span><span class="country">${s.top_country ? countryAbbr(s.top_country) : ''}</span></div>`;
      trackList.appendChild(card);
    });
  } catch(e) {
    trackList.innerHTML = '<p style="color:var(--silver-dim);font-style:italic;font-size:.85rem">Could not load tracks.</p>';
  }
}
async function loadHighlights() {
  const grid = document.getElementById('songGrid');
  try {
    const res = await fetch('/songs?table=album-half-way-there');
    const data = await res.json();
    if (!data.success || !data.results || !data.results.length) {
      document.getElementById('highlightsSection').style.display = 'none';
      return;
    }
    const statsMap = {};
    await Promise.all(data.results.map(song =>
      fetch('/track-stats?name=' + encodeURIComponent(song.song_name))
        .then(r => r.ok ? r.json() : null).catch(() => null)
        .then(d => { if (d?.success && d.result) statsMap[song.song_name] = d.result; })
    ));
    data.results.sort((a, b) => {
      const sa = statsMap[a.song_name] ? (parseInt(statsMap[a.song_name].total_streams) || 0) : (parseInt(a.stream_count) || 0);
      const sb = statsMap[b.song_name] ? (parseInt(statsMap[b.song_name].total_streams) || 0) : (parseInt(b.stream_count) || 0);
      return sb - sa;
    });
    grid.innerHTML = '';
    data.results.forEach(song => {
      const s = statsMap[song.song_name];
      const row = document.createElement('div');
      row.className = 'song-row';
      row.dataset.songName = song.song_name;
      row.innerHTML = `
<div class="song-title">${song.song_name.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
<iframe src="${song.spotify_embed_url}" height="80" frameborder="0" allowtransparency="true"
  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
<div class="stats-bar"><span>🎵 ${fmtStat(s ? s.total_streams : song.stream_count)}</span><span>${s?.total_likes ? '❤️ ' + fmtStat(s.total_likes) : ''}</span><span class="country">${s?.top_country ? countryAbbr(s.top_country) : ''}</span></div>
`;
      grid.appendChild(row);
    });
    document.getElementById('page-backdrop').style.backgroundImage =
      `linear-gradient(180deg, rgba(40,40,40,0.5) 0%, rgba(30,30,30,0.65) 55%, rgba(10,10,10,0.85) 100%), url('../Half Way There.jpg')`;
  } catch(e) {
    document.getElementById('highlightsSection').style.display = 'none';
  }
}
document.addEventListener('DOMContentLoaded', () => { loadHighlights(); loadStats(); });
</script>
</body>
</html>
