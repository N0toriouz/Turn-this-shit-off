<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Morning Commute — MadeUp MonkeyShit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--black: #0A0A0A;
--near-black: #111111;
--card-bg: #161616;
--border: #2A2A2A;
--silver: #C8C8C8;
--silver-dim: #888888;
--gold: #D4AF37;
--white: #F2F2F2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--black); color: var(--silver); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.7; }
nav {
position: fixed; top: 0; left: 0; right: 0; z-index: 100;
background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
border-bottom: 1px solid var(--border);
padding: 0 2rem; height: 60px;
display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--gold); text-decoration: none; }
.nav-back { color: var(--silver-dim); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
.nav-back:hover { color: var(--gold); }
.page-header {
padding: 120px 4rem 3rem;
max-width: 1200px; margin: 0 auto;
border-bottom: 1px solid var(--border);
}
.page-eyebrow { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
.page-title { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 4vw, 3rem); color: var(--white); margin-bottom: 0.75rem; line-height: 1.15; }
.page-subtitle { color: var(--silver-dim); font-size: 0.95rem; max-width: 520px; }
.songs-section { padding: 3rem 4rem 5rem; max-width: 1200px; margin: 0 auto; }
.song-table { display: flex; flex-direction: column; gap: 0.75rem; }
.song-title { font-family: 'DM Serif Display', serif; font-size: 0.88rem; color: var(--white); font-style: italic; }
.song-row { display: flex; flex-direction: column; gap: 0.4rem; }
.song-row iframe { display: block; width: 100%; }
.song-streams { font-size: 0.88rem; color: var(--silver-dim); font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
.songs-loading, .songs-empty { color: var(--silver-dim); font-size: 0.85rem; font-style: italic; padding: 2rem 0; }
footer {
border-top: 1px solid var(--border); padding: 2rem 4rem;
display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
background: var(--near-black);
}
.footer-name { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--gold); font-style: italic; }
.footer-note { font-size: 0.75rem; color: var(--silver-dim); opacity: 0.5; }
@media (max-width: 768px) {
.page-header { padding: 100px 1.5rem 2rem; }
.songs-section { padding: 2rem 1.5rem 4rem; }
footer { padding: 2rem 1.5rem; flex-direction: column; }
}
</style>
</head>
<body>
<nav>
<a href="/" class="nav-logo">MadeUp MonkeyShit</a>
<a href="/#catalog" class="nav-back">← All Moods</a>
</nav>

<div class="page-header">
<p class="page-eyebrow">Mood</p>
<h1 class="page-title">Your Morning Commute</h1>
<p class="page-subtitle">Sit next to a daydreaming driver, or catch the train</p>
</div>

<div class="songs-section">
<div class="song-table" id="songTable">
<p class="songs-loading">Loading...</p>
</div>
</div>

<footer>
<span class="footer-name">MadeUp MonkeyShit</span>
<span class="footer-note">Proud to make just awful music.</span>
</footer>

<script>
function formatStreams(n) {
  if (n < 1000) return '▶ ' + String(n);
  if (n === 1000) return '▶ 1K';
  return '▶ ' + (n / 1000).toFixed(1) + 'K';
}
async function loadSongs() {
const container = document.getElementById('songTable');
try {
const res = await fetch('/songs?table=mood-1');
const data = await res.json();
if (!data.success || !data.results || data.results.length === 0) {
container.innerHTML = '<p class="songs-empty">No songs here yet.</p>';
return;
}
container.innerHTML = '';
data.results.forEach(song => {
const row = document.createElement('div');
row.className = 'song-row';
row.innerHTML = `
<div class="song-title">${song.song_name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
<iframe src="${song.spotify_embed_url}" height="152" frameborder="0" allowtransparency="true"
  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
<div class="song-streams">${formatStreams(song.stream_count)}</div>
`;
container.appendChild(row);
});
} catch (err) {
container.innerHTML = '<p class="songs-empty">Could not load songs.</p>';
}
}
document.addEventListener('DOMContentLoaded', loadSongs);
</script>
</body>
</html>
